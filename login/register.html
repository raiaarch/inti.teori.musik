<!DOCTYPE html>
<!-- Source Codes By CodingNepal - www.codingnepalweb.com -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login_form">
    <!-- Login form container -->
    <form id="registerForm">
      <h3>Register dengan</h3>
      <div class="login_option">
        <!-- Google button -->
        <div class="option">
          <a href="#">
            <img src="https://www.google.com/favicon.ico" alt="Google" />
            <span>Google</span>
          </a>
        </div>
        <!-- Apple button -->
        <div class="option">
          <a href="#">
            <img src="https://www.apple.com/favicon.ico" alt="Apple" />
            <span>Apple</span>
          </a>
        </div>
      </div>
      <!-- Login option separator -->
      <p class="separator">
        <span>atau</span>
      </p>
      <!-- Email input box -->
      <div class="input_box">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Masukkan Username" required />
      </div>
      <div class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Masukkan E-mail" required />
      </div>
      <!-- Paswwrod input box -->
      <div class="input_box">
        <div class="password_title">
          <label for="password">Password</label>
          <a href="#">Lupa Password?</a>
        </div>
        <input type="password" id="password" placeholder="Masukkan Password" required />
      </div>
       <!-- Login button -->
        <div id="alertBox" style="display:none; color:red; margin-bottom:10px;"></div>
        <button type="submit">Register</button>
      <p class="sign_up">Sudah Memiliki Akun? <a href="index.html">Log in</a></p>
    </form>
  </div>
  <script src="js/register.js"></script>
</body>
</html>
